<div class="sidebar__header">
    <img class="sidebar__logo" ngSrc="/assets/icon-logo-white.png" width="42" height="36" priority
        alt="Logomarca ChegaMed" />
    <span class="sidebar__brand">ChegaMed</span>
</div>

<nav class="sidebar__nav" aria-label="Navegação principal">
    <a class="sidebar__link" routerLink="/dashboard" routerLinkActive="sidebar__link--active"
        (click)="navigated.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z" />
        </svg>
        <span>Início</span>
    </a>

    <a *hasRole="[UserRole.ADMIN, UserRole.MANAGER]" class="sidebar__link" routerLink="/users"
        routerLinkActive="sidebar__link--active" (click)="navigated.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span>Usuários</span>
    </a>

    <a *hasRole="[UserRole.ADMIN, UserRole.MANAGER]" class="sidebar__link" routerLink="/companies"
        routerLinkActive="sidebar__link--active" (click)="navigated.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
        </svg>
        <span>Empresas</span>
    </a>

    <a *hasRole="[UserRole.ADMIN, UserRole.MANAGER]" class="sidebar__link" routerLink="/patients"
        routerLinkActive="sidebar__link--active" (click)="navigated.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z" />
            <path d="M3.22 8.5h4.5l1.5-2 3 5.5 1.5-2h4.06" />
        </svg>
        <span>Pacientes</span>
    </a>
</nav>

<app-sidebar-user
    [name]="user()?.name ?? ''"
    [imageUrl]="user()?.imageUrl"
    [role]="userRole()"
    (logout)="onLogout()"
/>
