<div class="sidebar__header">
    <img class="sidebar__logo" ngSrc="/assets/icon-logo-white.png" width="42" height="36" priority
        alt="Logomarca ChegaMed" />
    <span class="sidebar__brand">ChegaMed</span>
</div>

<div class="sidebar__user">
    <app-avatar [name]="user()?.name ?? ''" [imageUrl]="user()?.imageUrl" size="md" />

    <div class="sidebar__user-info">
        <span class="sidebar__user-name">{{ user()?.name }}</span>

        @if (userRole(); as role) {
        <app-role-badge [role]="role" />
        }
    </div>
</div>

<nav class="sidebar__nav" aria-label="Navegação principal">
    <a class="sidebar__link" routerLink="/dashboard" routerLinkActive="sidebar__link--active"
        (click)="navigated.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z" />
        </svg>
        <span>Início</span>
    </a>

    <a *hasRole="[UserRole.ADMIN, UserRole.MANAGER]" class="sidebar__link" routerLink="/users"
        routerLinkActive="sidebar__link--active" (click)="navigated.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span>Usuários</span>
    </a>
</nav>

<button type="button" class="sidebar__logout" (click)="onLogout()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
    </svg>
    <span>Sair</span>
</button>
