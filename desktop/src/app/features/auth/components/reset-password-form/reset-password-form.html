@if (!token()) {
<div class="reset-password-form__alert" role="alert">
    Link inválido ou expirado. Solicite um novo e-mail de redefinição de senha.
</div>
} @else {
<form class="reset-password-form" (submit)="onSubmit($event)" novalidate>
    <app-password-field
        id="reset-password-new"
        label="Nova senha"
        [field]="resetForm.newPassword"
        [showGenerate]="false"
    />

    <app-password-field
        id="reset-password-confirm"
        label="Confirme a nova senha"
        [field]="resetForm.confirmPassword"
        [showGenerate]="false"
    />

    <button type="submit" class="btn btn-primary reset-password-form__submit" [disabled]="loading() || !canSubmit()">
        @if (loading()) {
        <span class="spinner spinner-sm" aria-hidden="true"></span>
        <span>Redefinindo...</span>
        } @else {
        <span>Redefinir senha</span>
        }
    </button>
</form>
}
