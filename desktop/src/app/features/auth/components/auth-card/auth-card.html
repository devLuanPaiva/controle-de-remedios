<div class="auth-card">
    <div class="auth-card__header">
        <img class="auth-card__logo" [ngSrc]="logoSrc()" width="56" height="56" priority alt="" />

        <h1 class="auth-card__title">{{ title() }}</h1>

        @if (subtitle()) {
            <p class="auth-card__subtitle">{{ subtitle() }}</p>
        }
    </div>

    <div class="auth-card__body">
        <ng-content />
    </div>
</div>
