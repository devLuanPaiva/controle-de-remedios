<section class="user-list">
    <header class="user-list__header">
        <h1 class="user-list__title">Usuários</h1>
    </header>

    <app-tabs [tabs]="tabs" [activeTabId]="activeTabId()" (tabChange)="onTabChange($event)" />

    @if (activeTabId() === 'list') {
        <form class="user-list__filters" (submit)="applyFilters($event)">
            <div class="user-list__filter-field">
                <label class="user-list__filter-label" for="filter-role">Perfil</label>
                <select
                    id="filter-role"
                    #roleSelect
                    class="input"
                    [value]="filterForm().role"
                    (change)="onFilterRoleChange(roleSelect.value)"
                >
                    <option value="">Todos os perfis</option>
                    @for (role of manageableRoles(); track role) {
                        <option [value]="role">{{ UserRoleLabels[role] }}</option>
                    }
                </select>
            </div>

            <div class="user-list__filter-field">
                <label class="user-list__filter-label" for="filter-name">Nome</label>
                <input
                    id="filter-name"
                    #nameInput
                    type="text"
                    class="input"
                    [value]="filterForm().name"
                    (input)="onFilterNameChange(nameInput.value)"
                />
            </div>

            <div class="user-list__filter-field">
                <label class="user-list__filter-label" for="filter-email">E-mail</label>
                <input
                    id="filter-email"
                    #emailInput
                    type="text"
                    class="input"
                    [value]="filterForm().email"
                    (input)="onFilterEmailChange(emailInput.value)"
                />
            </div>

            <div class="user-list__filter-field">
                <label class="user-list__filter-label" for="filter-cpf">CPF</label>
                <input
                    id="filter-cpf"
                    #cpfInput
                    type="text"
                    inputmode="numeric"
                    maxlength="14"
                    class="input"
                    [value]="filterForm().cpf"
                    (input)="onFilterCpfChange(cpfInput.value)"
                />
            </div>

            <div class="user-list__filter-field">
                <label class="user-list__filter-label" for="filter-active">Status</label>
                <select
                    id="filter-active"
                    #activeSelect
                    class="input"
                    [value]="filterForm().active"
                    (change)="onFilterActiveChange(activeSelect.value)"
                >
                    <option value="">Todos</option>
                    <option value="true">Ativos</option>
                    <option value="false">Inativos</option>
                </select>
            </div>

            <div class="user-list__filter-actions">
                <button type="submit" class="btn btn-primary btn-sm">Filtrar</button>
                <button type="button" class="btn btn-outline btn-sm" (click)="clearFilters()">Limpar filtros</button>
            </div>
        </form>

        @if (loading()) {
            <div class="loading user-list__state">
                <output class="spinner" aria-label="Carregando usuários"></output>
            </div>
        } @else if (error()) {
            <div class="user-list__state user-list__state--error">
                <p>{{ error() }}</p>
                <button type="button" class="btn btn-outline" (click)="retry()">
                    Tentar novamente
                </button>
            </div>
        } @else {
            <div class="table-responsive">
                <table class="table user-list__table">
                    <thead>
                        <tr>
                            <th class="user-list__col-avatar"><span class="sr-only">Foto</span></th>
                            <th>Nome</th>
                            <th class="user-list__col-email">E-mail</th>
                            <th>CPF</th>
                            <th>Perfil</th>
                            <th class="user-list__col-actions">Ações</th>
                        </tr>
                    </thead>

                    <tbody>
                        @for (user of users(); track user.id) {
                            <tr>
                                <td class="user-list__col-avatar">
                                    <app-avatar [name]="user.name" [imageUrl]="user.imageUrl" size="sm" />
                                </td>
                                <td data-label="Nome" class="user-list__col-name">{{ user.name }}</td>
                                <td data-label="E-mail" class="user-list__col-email">{{ user.email }}</td>
                                <td data-label="CPF">{{ user.cpf }}</td>
                                <td data-label="Perfil">
                                    <app-role-badge [role]="user.role" />
                                </td>
                                <td data-label="Ações" class="user-list__col-actions">
                                    <a class="btn btn-outline btn-sm" [routerLink]="['/users', user.id, 'edit']">
                                        Editar
                                    </a>
                                </td>
                            </tr>
                        } @empty {
                            <tr class="user-list__empty-row">
                                <td colspan="6">Nenhum usuário encontrado.</td>
                            </tr>
                        }
                    </tbody>
                </table>
            </div>

            <app-pagination [pagination]="pagination()" (previousPage)="goToPreviousPage()" (nextPage)="goToNextPage()" />
        }
    } @else {
        <app-user-create-form [allowedRoles]="manageableRoles()" />
    }
</section>
