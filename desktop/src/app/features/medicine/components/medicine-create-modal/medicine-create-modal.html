<app-modal #modalRef titleId="create-medicine-title" titleText="Novo medicamento" (closed)="closed.emit()">
    <form (submit)="onSubmit($event, modalRef)" novalidate>
        <div class="modal-body medicine-create-modal__body">
            <app-field
                for="create-medicine-name"
                label="Nome"
                [touched]="medicineForm.name().touched()"
                [invalid]="medicineForm.name().invalid()"
                [errorMessage]="medicineForm.name().errors()[0]?.message"
            >
                <input
                    id="create-medicine-name"
                    class="input"
                    type="text"
                    placeholder="Nome do medicamento"
                    autofocus
                    [formField]="medicineForm.name"
                    [attr.aria-invalid]="medicineForm.name().invalid() && medicineForm.name().touched()"
                    [attr.aria-describedby]="medicineForm.name().invalid() && medicineForm.name().touched() ? 'create-medicine-name-error' : null"
                />
            </app-field>

            <app-field
                for="create-medicine-ean-code"
                label="Código EAN"
                [touched]="medicineForm.eanCode().touched()"
                [invalid]="medicineForm.eanCode().invalid()"
                [errorMessage]="medicineForm.eanCode().errors()[0]?.message"
            >
                <input
                    id="create-medicine-ean-code"
                    class="input"
                    type="text"
                    inputmode="numeric"
                    placeholder="Código de barras"
                    [formField]="medicineForm.eanCode"
                    [attr.aria-invalid]="medicineForm.eanCode().invalid() && medicineForm.eanCode().touched()"
                    [attr.aria-describedby]="medicineForm.eanCode().invalid() && medicineForm.eanCode().touched() ? 'create-medicine-ean-code-error' : null"
                />
            </app-field>

            <app-image-upload-field
                id="create-medicine-image"
                label="Imagem do medicamento"
                context="MEDICINE"
                [ownerName]="model().name"
                [imageUrl]="model().imageUrl"
                (uploaded)="onImageUploaded($event)"
            />

            @if (connectedCompany(); as company) {
                <p class="medicine-create-modal__hint">
                    Este medicamento será associado à empresa conectada: <strong>{{ company.name }}</strong>.
                </p>
            }
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-outline btn-sm" (click)="modalRef.requestClose()">Cancelar</button>
            <button type="submit" class="btn btn-primary btn-sm" [disabled]="!canSubmit()">
                @if (mutating()) {
                    <span class="spinner spinner-sm" aria-hidden="true"></span>
                    <span>Salvando...</span>
                } @else {
                    <span>Salvar</span>
                }
            </button>
        </div>
    </form>
</app-modal>
