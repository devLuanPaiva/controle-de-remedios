<form class="prescription-create-form card" (submit)="onSubmit($event)" novalidate>
    <div class="card-body prescription-create-form__body">
        <div class="prescription-create-form__field">
            <span class="field__label">Paciente</span>
            <app-patient-picker (patientSelected)="onPatientSelected($event)" />

            @if (prescriptionForm.patientId().invalid() && prescriptionForm.patientId().touched()) {
                <span class="field__error">{{ prescriptionForm.patientId().errors()[0]?.message }}</span>
            }
        </div>

        <app-date-field
            id="create-prescription-issue-date"
            label="Data de emissão"
            [field]="prescriptionForm.issueDate"
            [max]="maxIssueDate"
        />

        <app-image-upload-multi-field
            id="create-prescription-image"
            label="Imagens da receita (opcional)"
            context="PRESCRIPTION"
            [imageUrls]="model().imageUrls"
            (imagesChanged)="onImagesChanged($event)"
        />

        <div class="prescription-create-form__items">
            <span class="field__label">Itens do receituário</span>

            @for (row of itemRows(); track $index) {
                <app-prescription-item-create-row
                    [index]="$index"
                    [canRemove]="itemRows().length > 1"
                    (itemChanged)="onItemChanged($index, $event)"
                    (removed)="removeItemRow($index)"
                />
            }

            <button type="button" class="btn btn-outline btn-sm prescription-create-form__add-item" (click)="addItemRow()">
                Adicionar item
            </button>

            @if (validItems().length === 0) {
                <span class="field__error">Adicione ao menos um item válido.</span>
            }
        </div>
    </div>

    <div class="card-footer">
        <button type="submit" class="btn btn-primary" [disabled]="!canSubmit()">
            @if (mutating()) {
                <span class="spinner spinner-sm" aria-hidden="true"></span>
                <span>Salvando...</span>
            } @else {
                <span>Cadastrar receituário</span>
            }
        </button>
    </div>
</form>
