@for (tab of tabs(); track tab.id) {
    <button
        type="button"
        role="tab"
        class="tabs__tab"
        [class.tabs__tab--active]="tab.id === activeTabId()"
        [attr.aria-selected]="tab.id === activeTabId()"
        [attr.aria-controls]="tab.id + '-panel'"
        [id]="tab.id + '-tab'"
        (click)="selectTab(tab.id)"
    >
        {{ tab.label }}
    </button>
}
