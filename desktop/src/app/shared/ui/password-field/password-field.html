<app-field
    [for]="id()"
    [label]="label()"
    [touched]="field()().touched()"
    [invalid]="field()().invalid()"
    [errorMessage]="field()().errors()[0]?.message"
>
    <div class="password-field__row">
        <input
            [id]="id()"
            class="input"
            [type]="showPassword() ? 'text' : 'password'"
            [autocomplete]="autocomplete()"
            [formField]="field()"
            [attr.aria-invalid]="field()().invalid() && field()().touched()"
            [attr.aria-describedby]="field()().invalid() && field()().touched() ? id() + '-error' : null"
        />
        <button type="button" class="btn btn-outline btn-sm" (click)="toggleShowPassword()">
            {{ showPassword() ? 'Ocultar' : 'Mostrar' }}
        </button>
        <button type="button" class="btn btn-outline btn-sm" (click)="generatePassword()">
            Gerar senha
        </button>
    </div>
</app-field>
